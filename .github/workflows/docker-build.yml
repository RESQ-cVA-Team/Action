name: Build Action Docker Image

on:
  push:
    branches:
      - master
      - dev

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "REPO_NAME_LC=${REPO_NAME,,}" >> "$GITHUB_ENV"

      - name: Select image tags for branch
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          case "${GITHUB_REF_NAME}" in
            master)
              echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
              echo "IMAGE_SHA_TAG=master-$SHORT_SHA" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "IMAGE_TAG=dev" >> "$GITHUB_ENV"
              echo "IMAGE_SHA_TAG=dev-$SHORT_SHA" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch for docker publish: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Verify SSOT YAML presence
        run: |
          echo "Listing SSOT directory contents:";
          ls -al src/shared/SSOT || true
          test -f src/shared/SSOT/ChartType.yml || (echo "ERROR: SSOT YAML files missing. Did the submodule fetch?" >&2; exit 1)
          wc -l src/shared/SSOT/*.yml || true

      - name: Build Docker image (fail-fast if SSOT missing)
        run: |
          docker build --progress=plain \
            -t ghcr.io/$REPO_NAME_LC:$IMAGE_TAG \
            -t ghcr.io/$REPO_NAME_LC:$IMAGE_SHA_TAG \
            .

      - name: Push Docker image to GitHub Container Registry
        run: |
          docker push ghcr.io/$REPO_NAME_LC:$IMAGE_TAG
          docker push ghcr.io/$REPO_NAME_LC:$IMAGE_SHA_TAG
