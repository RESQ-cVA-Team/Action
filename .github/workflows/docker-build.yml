name: Build Action Docker Image

on:
  push:
    branches:
      - master
      - dev

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          submodules: recursive
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "REPO_NAME_LC=${REPO_NAME,,}" >> "$GITHUB_ENV"

      - name: Select image tags for branch
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"

          case "${GITHUB_REF_NAME}" in
            master)
              echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
              echo "IMAGE_SHA_TAG=master-$SHORT_SHA" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "IMAGE_TAG=dev" >> "$GITHUB_ENV"
              echo "IMAGE_SHA_TAG=dev-$SHORT_SHA" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch for docker publish: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Verify SSOT YAML presence
        run: |
          echo "Listing SSOT directory contents:";
          ls -al src/shared/SSOT || true
          test -f src/shared/SSOT/ChartType.yml || (echo "ERROR: SSOT YAML files missing. Did the submodule fetch?" >&2; exit 1)
          wc -l src/shared/SSOT/*.yml || true

      - name: Build and push Docker image (fail-fast if SSOT missing)
        run: |
          set -euo pipefail
          ACTION_VERSION="$(tr -d '[:space:]' < VERSION)"
          SSOT_SHA="$(git ls-files -s src/shared/SSOT | awk '{print $2}' || echo 'unknown')"
          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            --provenance=mode=max \
            --sbom=true \
            --push \
            --build-arg ACTION_VERSION=$ACTION_VERSION \
            --build-arg ACTION_COMMIT_SHA=$GITHUB_SHA \
            --build-arg ACTION_IMAGE_TAG=$IMAGE_TAG \
            --build-arg ACTION_BUILD_DATE=$BUILD_DATE \
            --build-arg ACTION_SSOT_VERSION=$SSOT_SHA \
            -t ghcr.io/$REPO_NAME_LC:$IMAGE_TAG \
            -t ghcr.io/$REPO_NAME_LC:$IMAGE_SHA_TAG \
            .
